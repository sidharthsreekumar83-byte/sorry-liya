<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liya 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a1a, #2c2c2c);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.container {
    text-align: center;
    padding: 25px;
    max-width: 350px;
    animation: fadeIn 2s ease;
}

h1 {
    font-size: 26px;
    margin-bottom: 10px;
    color: #ff6b81;
}

p {
    font-size: 16px;
    line-height: 1.6;
    opacity: 0.9;
}

button {
    margin-top: 25px;
    padding: 12px 20px;
    border: none;
    border-radius: 30px;
    background: #ff6b81;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff4757;
    transform: scale(1.05);
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Heart animation */
.heart {
    position: absolute;
    color: #ff6b81;
    font-size: 20px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(100vh); opacity: 0;}
    50% {opacity: 1;}
    100% {transform: translateY(-10vh); opacity: 0;}
}
</style>
</head>

<body>

<div class="container">
    <h1>Liya… 💖</h1>
    <p id="text">
        I know things weren’t perfect… and I know I hurt you.  
        But fixing things with you meant everything to me.  
        I don’t want to repeat mistakes… I want to do better.  
        Not just say it — actually prove it.  
    </p>

    <button onclick="next()">Tap here</button>
</div>

<script>
let step = 0;

function next() {
    const messages = [
        "I really value you, Liya… more than I show sometimes.",
        "I’m not perfect… but I’m willing to grow for us.",
        "I don’t want to lose what we have.",
        "I’ll make things right… step by step 💖"
    ];

    if(step < messages.length){
        document.getElementById("text").innerText = messages[step];
        step++;
    } else {
        document.querySelector(".container").innerHTML =
        "<h1>💖</h1><p>Thank you for staying… it means more than you know.</p>";
    }
}

// Floating hearts
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    heart.innerText = "❤";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}, 600);
</script>

</body>
</html>
